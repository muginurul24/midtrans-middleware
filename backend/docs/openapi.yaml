        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/AlertEndpoint"

    CreateAlertEndpointRequest:
      type: object
      required: [name, channel, destination_url]
      properties:
        name:
          type: string
        channel:
          type: string
          enum: [webhook, slack_webhook, discord_webhook]
        destination_url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [webhook.failed_permanently]
        status:
