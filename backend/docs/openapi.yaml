          type: string
        channel:
          type: string
          enum: [webhook, slack_webhook, discord_webhook]
        destination_url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [webhook.failed_permanently]
        status:
          type: string
          enum: [active, inactive]
        auth_token:
          type: string
          writeOnly: true
        clear_auth_token:
          type: boolean

    AlertEndpointTestDispatch:
      type: object
      required: [alert_delivery_id, status]
      properties:
        alert_delivery_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending]

    Store:
      type: object
