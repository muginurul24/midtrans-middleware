          type: string
          format: date-time

    PasswordResetRequestResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        preview:
          allOf:
            - $ref: "#/components/schemas/PasswordResetPreview"
          nullable: true

    MFACodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: TOTP code or recovery code depending on endpoint and state

    User:
      type: object
      required: [id, name, email, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TokenPair:
      type: object
