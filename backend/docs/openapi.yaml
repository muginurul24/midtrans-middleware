  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Invalid payload.
              request_id: req_abc123
              details: {}
    UnauthorizedError:
      description: Dashboard authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Invalid or expired access token.
              request_id: req_abc123
              details: {}
    StoreUnauthorizedError:
      description: Store API authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Invalid store API token.
              request_id: req_abc123
              details: {}
    StoreForbiddenError:
      description: Store token is valid but cannot access this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Token scope does not allow this action.
              request_id: req_abc123
              details: {}
    DashboardAccessError:
      description: Dashboard access blocked by MFA policy
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            setup_required:
              value:
                success: false
                error:
                  code: MFA_SETUP_REQUIRED
                  message: MFA setup is required before dashboard access.
                  request_id: req_abc123
                  details: {}
            verification_required:
              value:
                success: false
                error:
                  code: MFA_VERIFICATION_REQUIRED
                  message: MFA verification is required before dashboard access.
                  request_id: req_abc123
                  details: {}
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found.
              request_id: req_abc123
              details: {}
    ConflictError:
      description: Unique or state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: CONFLICT
              message: Resource already exists.
              request_id: req_abc123
              details: {}
    TransactionConflictError:
      description: Transaction idempotency or order conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            duplicate_payload_conflict:
              value:
                success: false
                error:
                  code: TRANSACTION_CONFLICT
                  message: Order ID already exists with different payload.
                  request_id: req_abc123
                  details: {}
            processing_lock:
              value:
                success: false
                error:
                  code: TRANSACTION_CONFLICT
                  message: Transaction is already being processed.
                  request_id: req_abc123
                  details: {}
    TokenRevokedError:
      description: Token has already been revoked
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: TOKEN_REVOKED
              message: API token has already been revoked.
              request_id: req_abc123
              details: {}
    RateLimitedError:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: RATE_LIMITED
              message: Rate limit exceeded.
              request_id: req_abc123
              details:
                token_limit: 60
                store_limit: 300
    MidtransError:
      description: Midtrans request failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: MIDTRANS_ERROR
              message: Failed to create transaction on Midtrans.
              request_id: req_abc123
              details: {}
    WebhookSignatureInvalidError:
      description: Midtrans webhook signature is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: WEBHOOK_SIGNATURE_INVALID
              message: Invalid Midtrans webhook signature.
              request_id: req_abc123
              details: {}
    WebhookResendNotAllowedError:
      description: Delivery is not eligible for manual resend
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: WEBHOOK_RESEND_NOT_ALLOWED
              message: Webhook delivery cannot be resent in its current state.
              request_id: req_abc123
              details: {}
    MFAConflictError:
      description: MFA setup state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            already_enabled:
              value:
                success: false
                error:
                  code: MFA_ALREADY_ENABLED
                  message: MFA is already enabled.
                  request_id: req_abc123
                  details: {}
            verification_required:
              value:
                success: false
                error:
                  code: MFA_VERIFICATION_REQUIRED
                  message: Verify the current MFA state first.
                  request_id: req_abc123
                  details: {}
    MFASetupRequiredError:
      description: MFA has not been enabled yet
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: MFA_SETUP_REQUIRED
              message: MFA is not enabled yet.
              request_id: req_abc123
              details: {}
    MFAVerificationRequiredError:
      description: Session must verify MFA before continuing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: MFA_VERIFICATION_REQUIRED
              message: Verify this session before rotating MFA.
              request_id: req_abc123
              details: {}
    MFAInvalidCodeError:
      description: MFA code or recovery code is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: MFA_CODE_INVALID
              message: Invalid MFA or recovery code.
              request_id: req_abc123
              details: {}
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: Internal server error.
              request_id: req_abc123
              details: {}

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data: {}

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorBody"

    ErrorBody:
      type: object
      required: [code, message, request_id, details]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true

    AppInfo:
      type: object
      required: [name, status, version]
      properties:
        name:
          type: string
        status:
          type: string
        version:
          type: string

    HealthData:
      type: object
      required: [status, app_env, services, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        app_env:
          type: string
        services:
          type: object
          properties:
            postgres:
              $ref: "#/components/schemas/DependencyStatus"
            redis:
              $ref: "#/components/schemas/DependencyStatus"
        timestamp:
          type: string
          format: date-time

    DependencyStatus:
      type: object
      required: [status]
      properties:
