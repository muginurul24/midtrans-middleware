          type: string
        platform_order_id:
          type: string
        midtrans_transaction_id:
          type: string
          nullable: true
        payment_type:
          type: string
        gross_amount:
          type: integer
        currency:
          type: string
        status:
          type: string
        fraud_status:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true
      example:
        id: 7dd41ec0-1c48-492a-b2df-8be28b4115b8
        order_id: INV-2026-0001
        platform_order_id: store123_INV-2026-0001
