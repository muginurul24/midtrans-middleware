          minimum: 1
        currency:
          type: string
          example: IDR
        payment_type:
          type: string
          example: bank_transfer
        bank:
          type: string
          enum: [bca, bni, bri, cimb, permata, mandiri]
        customer:
          $ref: "#/components/schemas/Customer"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        callback_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    Customer:
