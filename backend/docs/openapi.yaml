openapi: 3.1.0
info:
  title: PayGate Payment Platform API
  version: 1.0.0
  description: |
    API contract for the current MVP implementation of the PayGate multi-tenant
    payment middleware.

    Coverage in this spec matches the endpoints that are already live in the
    backend codebase today:
    - dashboard auth and MFA
    - store management
    - store API token management
    - store-facing transaction API
    - Midtrans inbound webhook
    - webhook delivery inspection and resend
    - dashboard operational alert destinations

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
  - name: Observability
  - name: Dashboard Auth
  - name: Dashboard Stores
  - name: Dashboard Tokens
  - name: Dashboard Transactions
  - name: Dashboard Webhooks
  - name: Dashboard Alerts
  - name: Store API
  - name: Midtrans Webhook

paths:
  /:
    get:
      tags: [Health]
      summary: API root
      operationId: getRoot
      responses:
        "200":
          description: Basic API metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppInfo"
              example:
                success: true
                data:
                  name: payment-platform-api
                  status: bootstrapped
                  version: milestone-5

  /healthz:
    get:
      tags: [Health]
      summary: Healthcheck
      operationId: getHealth
      responses:
        "200":
          description: All required dependencies are healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthData"
        "503":
          description: One or more dependencies are degraded
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: false
                  data:
                    $ref: "#/components/schemas/HealthData"

  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus exposition format for API metrics and queue depth
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
              example: |
                # HELP payment_platform_charge_requests_total Total charge requests grouped by result.
                # TYPE payment_platform_charge_requests_total counter
                payment_platform_charge_requests_total{result="success"} 12

  /v1/dashboard/auth/register:
    post:
      tags: [Dashboard Auth]
      summary: Register dashboard account
      operationId: registerDashboardUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              name: Founder Demo
              email: founder@example.com
              password: SuperSecure123
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/login:
    post:
      tags: [Dashboard Auth]
      summary: Login dashboard account
      operationId: loginDashboardUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: founder@example.com
              password: SuperSecure123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthSessionResponse"
              example:
                success: true
                data:
                  user:
                    id: 93a91d7f-5f6a-4f8c-b489-05c7f9c0a901
                    name: Founder Demo
                    email: founder@example.com
                    role: user
                    created_at: "2026-05-02T03:00:00Z"
                    updated_at: "2026-05-02T03:00:00Z"
                  tokens:
                    access_token: eyJhbGciOi...
                    refresh_token: eyJhbGciOi...
                    token_type: Bearer
                    access_expires_at: "2026-05-02T03:15:00Z"
                    refresh_expires_at: "2026-05-09T03:00:00Z"
                  mfa:
                    required: false
                    enabled: false
                    verified: false
                    setup_required: false
                    can_access_dashboard: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/forgot-password:
    post:
      tags: [Dashboard Auth]
      summary: Request dashboard password reset
      operationId: requestDashboardPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
            example:
              email: founder@example.com
      responses:
        "202":
          description: Reset flow accepted without exposing whether the email exists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PasswordResetRequestResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/reset-password:
    post:
      tags: [Dashboard Auth]
      summary: Reset dashboard password using one-time token
      operationId: resetDashboardPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            example:
              token: RESETTOKENEXAMPLE123
              new_password: SuperSecure456
      responses:
        "204":
          description: Password reset completed and existing sessions revoked
        "400":
          description: Invalid payload or reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  code: RESET_TOKEN_INVALID
                  message: Reset token is invalid, expired, or already used.
                  request_id: 8eb7164a7d6d
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/refresh:
    post:
      tags: [Dashboard Auth]
      summary: Refresh dashboard session
      operationId: refreshDashboardSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthRefreshResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/logout:
    post:
      tags: [Dashboard Auth]
      summary: Logout current dashboard session
      operationId: logoutDashboardSession
      security:
        - DashboardBearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/change-password:
    post:
      tags: [Dashboard Auth]
      summary: Change dashboard password
      operationId: changeDashboardPassword
      security:
        - DashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password updated
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/mfa/setup:
    post:
      tags: [Dashboard Auth]
      summary: Prepare MFA setup
      operationId: setupDashboardMFA
      security:
        - DashboardBearerAuth: []
      responses:
        "200":
          description: TOTP secret prepared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MFASetup"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/MFAConflictError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/mfa/verify:
    post:
      tags: [Dashboard Auth]
      summary: Verify MFA code for current session
      operationId: verifyDashboardMFA
      security:
        - DashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFACodeRequest"
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MFAVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/MFAInvalidCodeError"
        "409":
          $ref: "#/components/responses/MFASetupRequiredError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/mfa/rotate:
    post:
      tags: [Dashboard Auth]
      summary: Rotate MFA secret and prepare new setup
      operationId: rotateDashboardMFA
      security:
        - DashboardBearerAuth: []
      responses:
        "200":
          description: New MFA secret prepared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MFASetup"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/MFAVerificationRequiredError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/mfa/disable:
    post:
      tags: [Dashboard Auth]
      summary: Disable MFA
      operationId: disableDashboardMFA
      security:
        - DashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFACodeRequest"
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MFAStatusResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/MFAInvalidCodeError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/auth/mfa/recovery/regenerate:
    post:
      tags: [Dashboard Auth]
      summary: Regenerate MFA recovery codes
      operationId: regenerateRecoveryCodes
      security:
        - DashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFACodeRequest"
      responses:
        "200":
          description: New recovery codes generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecoveryCodesResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/MFAInvalidCodeError"
        "409":
          $ref: "#/components/responses/MFASetupRequiredError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/me:
    get:
      tags: [Dashboard Auth]
      summary: Get current dashboard user
      operationId: getDashboardMe
      security:
        - DashboardBearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores:
    get:
      tags: [Dashboard Stores]
      summary: List stores for current user
      operationId: listStores
      security:
        - DashboardBearerAuth: []
      responses:
        "200":
          description: Store list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StoreListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Dashboard Stores]
      summary: Create store
      operationId: createStore
      security:
        - DashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
            example:
              name: Demo Store
              slug: demo-store
              domain: shop.example.com
              default_callback_url: https://shop.example.com/api/payment/callback
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StoreWithSecret"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}:
    get:
      tags: [Dashboard Stores]
      summary: Get store
      operationId: getStore
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      responses:
        "200":
          description: Store detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Store"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Dashboard Stores]
      summary: Update store
      operationId: updateStore
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Store"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Dashboard Stores]
      summary: Deactivate store
      operationId: deactivateStore
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      responses:
        "204":
          description: Store deactivated
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/webhook-secret:
    get:
      tags: [Dashboard Stores]
      summary: Reveal store webhook secret
      operationId: revealStoreWebhookSecret
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      responses:
        "200":
          description: Store webhook secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WebhookSecret"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/webhook-secret/rotate:
    post:
      tags: [Dashboard Stores]
      summary: Rotate store webhook secret
      operationId: rotateStoreWebhookSecret
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      responses:
        "200":
          description: New webhook secret generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WebhookSecret"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/api-tokens:
    get:
      tags: [Dashboard Tokens]
      summary: List store API tokens
      operationId: listStoreTokens
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      responses:
        "200":
          description: Store API tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Dashboard Tokens]
      summary: Create store API token
      operationId: createStoreToken
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
            example:
              name: Backend Production
              scopes:
                - transaction:create
                - transaction:read
      responses:
        "201":
          description: Store API token created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreatedToken"
              example:
                success: true
                data:
                  id: 4a5d6f8b-4d6e-4b2f-97d4-f87f86d70df6
                  store_id: 9ab66fb6-cfbd-44ba-8df9-499c53e55d12
                  name: Backend Production
                  token_prefix: tok_paygate_7sQ2m
                  scopes:
                    - transaction:create
                    - transaction:read
                  last_used_at: null
                  expires_at: null
                  revoked_at: null
                  created_at: "2026-05-02T10:00:00Z"
                  token: tok_paygate_example_7sQ2m3pZ8m2d2Kb1bV6Jr9qL
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/api-tokens/{token_id}:
    delete:
      tags: [Dashboard Tokens]
      summary: Revoke store API token
      operationId: revokeStoreToken
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
        - $ref: "#/components/parameters/TokenID"
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/api-tokens/{token_id}/rotate:
    post:
      tags: [Dashboard Tokens]
      summary: Rotate store API token
      operationId: rotateStoreToken
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
        - $ref: "#/components/parameters/TokenID"
      responses:
        "200":
          description: New store token created and old token revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreatedToken"
              example:
                success: true
                data:
                  id: 390c2237-6900-4587-b901-7d5205a7e8d1
                  store_id: 9ab66fb6-cfbd-44ba-8df9-499c53e55d12
                  name: Backend Production
                  token_prefix: tok_paygate_9aM4p
                  scopes:
                    - transaction:create
                    - transaction:read
                  last_used_at: null
                  expires_at: null
                  revoked_at: null
                  created_at: "2026-05-02T10:15:00Z"
                  token: tok_paygate_example_9aM4pQ2sD8kLm2vP0xR1b3Y
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/DashboardAccessError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/TokenRevokedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/dashboard/stores/{store_id}/transactions:
    get:
      tags: [Dashboard Transactions]
      summary: List store transactions
      operationId: listDashboardTransactions
      security:
        - DashboardBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/TransactionStatus"
        - $ref: "#/components/parameters/Query"
      responses:
        "200":
          description: Store transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DashboardTransactionListResponse"
              example:
                success: true
                data:
                  transactions:
