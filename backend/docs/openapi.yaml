        name: Backend Production
        token_prefix: tok_paygate_7sQ2m
        scopes:
          - transaction:create
          - transaction:read
        last_used_at: null
        expires_at: null
        revoked_at: null
        created_at: "2026-05-02T10:00:00Z"
        token: tok_paygate_example_7sQ2m3pZ8m2d2Kb1bV6Jr9qL

